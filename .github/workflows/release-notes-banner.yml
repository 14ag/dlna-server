name: Update Latest Release Notes

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const { data: latest } = await github.rest.repos.getLatestRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            if (latest.id === context.payload.release.id) {
              const body = context.payload.release.body || '';
              if (!body.startsWith('![Banner](./assets/banner.webp)')) {
                await github.rest.repos.updateRelease({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  release_id: latest.id,
                  body: '![Banner](./assets/banner.webp)\n\n' + body,
                });
              }
            }
