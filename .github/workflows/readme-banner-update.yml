name: Update Banner

on:
  schedule:
    # runs every 24 hours
    - cron: '0 */24 * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      # ignore pushes that only change the banner asset
      # prevents this workflow from triggering itself in a loop
      - 'assets/**'

permissions:
  contents: write

jobs:
  update-banner:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Create assets folder if it does not exist
        run: mkdir -p assets

      - name: Ensure README contains banner
        shell: bash
        run: |
          BANNER='![Banner](./assets/banner.webp)'

          # Create README if it doesn't exist
          touch README.md

          # Only prepend if the banner isn't already present anywhere
          if ! grep -Fxq "$BANNER" README.md; then
            {
              printf '%s\n\n' "$BANNER"
              cat README.md
            } > README.md.tmp
            mv README.md.tmp README.md
          fi

      - name: Fetch banner image from backend
        env:
          BANNER_KEY: ${{ secrets.BANNER_KEY }}
        run: |
          VERCEL_URL="${{ vars.VERCEL_URL }}"
          curl -sf \
            -H "X-Banner-Key: ${BANNER_KEY}" \
            -H "repo-name: ${{ github.event.repository.name }}" \
            "${VERCEL_URL}/banner" \
            --output assets/banner.webp

      - name: Commit and push if anything changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add assets/banner.webp README.md

          git diff --cached --quiet && echo "no change" && exit 0

          git commit -m "chore: rotate banner"
          git push